<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="icon" type="image/png" href="logo11.png">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col justify-between">

    <header class="w-full bg-blue-900 px-6 py-4 flex items-center justify-between"> 
        <div class="flex items-center space-x-3">
            <img class="h-10 w-10 rounded-full object-cover" src="logo11.png" alt="Logo">
            <span class="text-xl font-bold tracking-tight text-white">Luna_Predebt</span>
        </div> 

        <nav class="flex items-center space-x-8 text-medium">  
            <a href="home.html" class="inline-block text-indigo-100 hover:-translate-y-0.5 hover:text-white  transition-all duration-200">Home</a>
            <a href="about.html" class="inline-block text-indigo-100  hover:-translate-y-0.5 hover:text-white transition-all duration-200">About</a> 
            <a href="projects.html" class="inline-block text-indigo-100  hover:-translate-y-0.5 hover:text-white transition-all duration-200">Projects</a> 
            <a href="contact.html" class="inline-block text-indigo-100 hover:-translate-y-0.5 hover:text-white transition-all duration-200">Contact</a>
        </nav>

      <button class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-6 py-2.5 rounded-xl shadow-sm hover:shadow active:scale-95 transition-all duration-200">
            Hire me 
        </button>
    </header>

    <main class="flex-grow flex items-center justify-center py-12">
        <section class="w-full max-w-md mx-auto p-6 bg-white rounded-2xl shadow-lg border border-slate-200">
            <h2 class="text-2xl font-bold text-slate-900 mb-6">Get in Touch</h2>
              
            <form action="thankyou.html" method="GET" class="space-y-4">
                <div>
                    <label for="name" class="block text-sm font-medium text-slate-700 mb-1">Name</label>
                    <input type="text" id="name" name="name" required class="w-full px-4 py-2.5 shadow-sm border border-slate-300 rounded-xl text-slate-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-sm">
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                    <input type="email" id="email" name="email" required class="w-full px-4 py-2.5 shadow-sm border border-slate-300 rounded-xl text-slate-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-sm">
                </div>

                <div>
                    <label for="message" class="block text-sm font-medium text-slate-700 mb-1">Message</label>
                    <textarea id="message" name="message" rows="4" required class="w-full px-4 py-2.5 shadow-sm border border-slate-300 rounded-xl text-slate-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-sm resize-none"></textarea>
                </div>

                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl shadow-sm active:scale-[0.98] transition-all duration-200 text-sm mt-2">
                    Submit Form
                </button>
            </form>
        </section>
    </main>

    <footer class="w-full bg-white border-t border-slate-200 py-8 px-6">
        <div class="max-w-4xl mx-auto flex flex-col items-center justify-center space-y-4 text-center">
            
            <div>
                <span class="text-lg font-bold tracking-tight text-slate-900">Luna_Predebt</span>
            </div>

            <nav class="flex flex-wrap justify-center gap-x-6 gap-y-2 text-sm font-medium text-slate-600">
                <a href="home.html" class="hover:text-indigo-600 transition-colors duration-200">Home</a>
                <a href="about.html" class="hover:text-indigo-600 transition-colors duration-200">About</a>
                <a href="projects.html" class="hover:text-indigo-600 transition-colors duration-200">Projects</a>
                <a href="contact.html" class="hover:text-indigo-600 transition-colors duration-200">Contact</a>
            </nav>

            <div class="flex justify-center space-x-6 text-sm font-medium text-slate-500">
                <a href="https://facebook.com" target="_blank" rel="https://www.facebook.com/" class="hover:text-indigo-600 transition-colors duration-200">Facebook</a>
                <a href="https://twitter.com" target="_blank" rel="https://twitter.com/" class="hover:text-indigo-600 transition-colors duration-200">Twitter</a>
                <a href="https://linkedin.com" target="_blank" rel="https://www.linkedin.com/" class="hover:text-indigo-600 transition-colors duration-200">LinkedIn</a>
            </div>

            <div class="w-full max-w-xs pt-4 border-t border-slate-200 text-xs text-slate-400">
                <p>&copy; 2026 Luna_Predebt. All rights reserved.</p>
            </div>

        </div>
    </footer>

</body>
</html>
